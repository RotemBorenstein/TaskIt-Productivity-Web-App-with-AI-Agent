name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - deploy

jobs:
  django-checks:
    name: Django checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: taskit_ci
          POSTGRES_USER: taskit_ci
          POSTGRES_PASSWORD: taskit_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taskit_ci -d taskit_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DJANGO_ENV: development
      DEBUG: "True"
      SECRET_KEY: ci-secret-key
      DB_NAME: taskit_ci
      DB_USER: taskit_ci
      DB_PASSWORD: taskit_ci
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_SSLMODE: disable
      EMAIL_TOKEN_ENCRYPTION_KEY: ci-email-token-key
      OPENAI_API_KEY: ci-openai-key
      GOOGLE_CLIENT_ID: ci-google-client-id
      GOOGLE_CLIENT_SECRET: ci-google-client-secret
      GOOGLE_REDIRECT_URI: http://localhost:8000/auth/google/callback
      MICROSOFT_CLIENT_ID: ci-microsoft-client-id
      MICROSOFT_CLIENT_SECRET: ci-microsoft-client-secret
      MICROSOFT_REDIRECT_URI: http://localhost:8000/auth/microsoft/callback
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      REDIS_URL: redis://localhost:6379/0

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django system checks
        run: python manage.py check

      - name: Run Django test suite
        run: python manage.py test

  docker-build:
    name: Docker build validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Build application image
        run: docker build -t taskit-ci .
