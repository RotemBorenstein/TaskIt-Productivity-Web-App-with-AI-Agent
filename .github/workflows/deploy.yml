name: Deploy

on:
  push:
    branches:
      - deploy

jobs:
  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install SSH client
        run: sudo apt-get update && sudo apt-get install -y openssh-client

      - name: Configure SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Configure known hosts
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          touch ~/.ssh/known_hosts
          if [ -n "$SSH_KNOWN_HOSTS" ]; then
            printf '%s\n' "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${SSH_PORT:-22}" "$SSH_HOST" >> ~/.ssh/known_hosts
          fi
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy application
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" <<'EOF'
          set -e
          cd /home/deploy/TaskIt
          git fetch origin
          git switch deploy
          git pull --ff-only origin deploy
          docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.server up --build -d --no-deps web worker beat caddy
          docker compose ps
          curl -f https://taskit.duckdns.org
          EOF
