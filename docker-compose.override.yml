services:
  db:
    ports:
      - "${DB_PORT:-5432}:5432"

  web:
    environment:
      DB_HOST: ${CONTAINER_DB_HOST:-db}
      DB_PORT: ${CONTAINER_DB_PORT:-5432}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
      SESSION_COOKIE_SECURE: "False"
      CSRF_COOKIE_SECURE: "False"
      SECURE_SSL_REDIRECT: "False"
      SECURE_HSTS_SECONDS: "0"

  worker:
    environment:
      DB_HOST: ${CONTAINER_DB_HOST:-db}
      DB_PORT: ${CONTAINER_DB_PORT:-5432}
      SESSION_COOKIE_SECURE: "False"
      CSRF_COOKIE_SECURE: "False"
      SECURE_SSL_REDIRECT: "False"
      SECURE_HSTS_SECONDS: "0"

  beat:
    environment:
      DB_HOST: ${CONTAINER_DB_HOST:-db}
      DB_PORT: ${CONTAINER_DB_PORT:-5432}
      SESSION_COOKIE_SECURE: "False"
      CSRF_COOKIE_SECURE: "False"
      SECURE_SSL_REDIRECT: "False"
      SECURE_HSTS_SECONDS: "0"

  caddy:
    image: caddy:2-alpine
    ports:
      - "8000:80"
    depends_on:
      - web
    volumes:
      - ./Caddyfile.local:/etc/caddy/Caddyfile:ro
      - static_data:/srv/staticfiles:ro
      - caddy_data:/data
      - caddy_config:/config
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "10"
