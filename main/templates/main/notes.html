{% extends "main/base.html" %}
{% load static %}

{% block title %}Notes · TaskIt{% endblock %}

{% block extra_styles %}
<link rel="stylesheet" href="{% static 'main/notes.css' %}">
{% endblock %}

{% block content %}
<div class="notes-grid">
  <!-- Left: Subjects -->
  <aside class="subjects">
    <div class="subjects-header">
      <h2>Subjects</h2>
      <button class="add-btn" id="add-subject">+</button>
    </div>
    <ul id="subjects-list">
    </ul>
  </aside>

  <!-- Middle: Notes -->
  <section class="notes">
    <div class="notes-toolbar">
      <input type="text" id="search" placeholder="Search notes…">
      <button class="new-note-btn">New Note</button>
    </div>

    <ul id="notes-list">
    </ul>
  </section>

  <!-- Right: Viewer/Editor -->
  <section class="viewer" id="viewer" aria-live="polite" aria-busy="false">
    <div class="viewer-header">
      <h3 id="viewer-title"></h3>
      <div class="viewer-actions">
        <!-- Edit Icon -->
        <button id="edit-btn" class="btn-light" aria-label="Edit Note" title="Edit Note">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-pencil"><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/><path d="m15 5 4 4"/></svg>
        </button>
        <!-- Delete Icon -->
        <button id="delete-note-btn" class="btn-light" aria-label="Delete Note" title="Delete Note">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-trash-2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
        </button>
        <!-- Close Icon -->
        <button id="close-btn" class="btn-light" aria-label="Close Viewer" title="Close Viewer">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
    </div>

    <div class="viewer-empty-state" id="viewer-empty-state">
      <p>Select a note to read or edit it.</p>
    </div>

    <div id="viewer-content" class="viewer-content"></div>

    <!-- Edit mode -->
    <div id="editor" class="editor hidden">
      <input id="edit-title" type="text" class="edit-title">
      <textarea id="edit-text" class="edit-text" rows="12"></textarea>
      <div class="editor-actions">
        <button id="save-btn" class="btn-primary">Save</button>
        <button id="cancel-btn" class="btn-light">Cancel</button>
      </div>
    </div>
  </section>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="{% static 'main/notes.js' %}"></script>
{% endblock %}
